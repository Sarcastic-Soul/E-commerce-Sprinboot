name: Fullstack CI/CD Pipeline

on:
    push:
        branches:
            - main

jobs:
    build-and-push-fullstack:
        name: Build and Push Monolith Image
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Build and push unified Docker image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  file: ./Dockerfile
                  push: true
                  build-args: |
                      VITE_RAZORPAY_KEY_ID=${{ secrets.VITE_RAZORPAY_KEY_ID }}
                  # Change this tag to whatever you want
                  tags: ${{ secrets.DOCKER_USERNAME }}/brutshop-fullstack:latest

            - name: Trigger Render Deploy
              if: success()
              run: |
                  curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
