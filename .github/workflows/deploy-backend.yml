name: Backend CI/CD Pipeline

# Trigger the workflow when code is pushed to the 'main' branch
on:
    push:
        branches:
            - main
        # Optional: Only run this action if files in the backend folder changed
        paths:
            - "backend/**"

jobs:
    build-and-push-docker-image:
        name: Build and Push to Docker Hub
        runs-on: ubuntu-latest

        steps:
            # Step 1: Get the code from GitHub
            - name: Checkout code
              uses: actions/checkout@v4

            # Step 2: Set up Docker Buildx (allows advanced building features)
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            # Step 3: Log in to Docker Hub using the secrets we created
            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            # Step 4: Build the image using the Dockerfile and push it
            - name: Build and push Docker image
              uses: docker/build-push-action@v5
              with:
                  context: ./backend
                  file: ./backend/Dockerfile
                  push: true
                  # Change "brutshop-api" to whatever you want to name your image
                  tags: ${{ secrets.DOCKER_USERNAME }}/brutshop-api:latest
